name: Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'charts/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'charts/**'
      - 'docs/**'
      - '*.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.22'

jobs:
  # ── Unit + Integration Tests ─────────────────────────────────────────────
  unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run integration tests
        run: |
          go test -tags=integration -coverprofile=coverage-integration.out -covermode=atomic ./...

      - name: Merge coverage profiles
        run: |
          # Merge unit + integration coverage
          cat coverage.out > coverage-merged.out
          grep -v "^mode:" coverage-integration.out >> coverage-merged.out

      - name: Check coverage threshold (≥ 60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage-merged.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the 60% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-merged.out
          fail_ci_if_error: false

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # ── E2E Tests ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install kind
        run: |
          go install sigs.k8s.io/kind@latest
          kind version

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Build kube2iam Docker image
        run: |
          docker build -t kube2iam:e2e-test .

      - name: Run E2E tests
        run: |
          go test -v -tags=e2e ./e2e/... -timeout=15m
        env:
          # Pass through Docker socket so kind can create containers
          DOCKER_HOST: unix:///var/run/docker.sock
