kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Multi-node cluster to test DaemonSet scheduling on all nodes.
nodes:
  - role: control-plane
    # Allow privileged pods (required for kube2iam's iptables manipulation).
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            allow-privileged: "true"
  - role: worker
  - role: worker
